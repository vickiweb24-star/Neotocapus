<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema Arneot - NeoTocapu</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #mensaje {
            position: absolute; top: 10px; left: 10px; z-index: 999;
            background: rgba(0,0,0,0.7); color: white; padding: 10px; font-family: sans-serif;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="mensaje">Apuntá con la cámara a tu NeoTocapu...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-tocapu">
      </a-entity>
    </scene>

    <script>
        const tocapuTarget = document.querySelector('#target-tocapu');
        tocapuTarget.addEventListener("targetFound", event => {
            console.log("¡NeoTocapu detectado!");
            // REEMPLAZÁ ESTE LINK DE ABAJO POR EL DE TU FLIPHTML5 O TU DRIVE
            window.location.href = "https://tu-enlace-de-fliphtml5-aca.com"; 
        });
    </script>
</body>
</html>
