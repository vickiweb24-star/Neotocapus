<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoTocapu - Realidad Aumentada</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #cartel-guia {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 9999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="cartel-guia">Apuntá con la cámara a tu NeoTocapu...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="neotocapu-objetivo"></a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#neotocapu-objetivo');
        targetEl.addEventListener("targetFound", event => {
            // Ponemos una alerta para confirmar que tu "circuito" detectó el dibujo
            alert("¡NeoTocapu Detectado con éxito!");
            window.location.href = "https://vickiweb24-star.github.io/Neotocapus/"; 
        });
    </script>

</body>
</html>
